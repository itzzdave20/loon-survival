name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      BUILDOZER_WARN_ON_ROOT: 0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: sudo apt update && sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip setuptools wheel Cython==0.29.33 buildozer && if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Pre-accept Android SDK licenses for Buildozer SDK path
        run: mkdir -p /home/runner/.buildozer/android/platform/android-sdk/licenses && printf '%s\n' 8933bad161af4178b1185d1a37fbf41ea5269c55 d56f5187479451eabf01fb78af6dfcb131a6481e 24333f8a63b6825ea9c5514f83c2829b004d1fee > /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-license

      - name: Build APK
        run: yes | buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: loon-survival-apk
          path: bin/*.apk
          if-no-files-found: error
