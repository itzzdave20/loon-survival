name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      BUILDOZER_WARN_ON_ROOT: 0
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/25.2.9519653

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android SDK and NDK
        uses: android-actions/setup-android@v3

      - name: Debug and locate Android SDK
        run: |
          echo "Checking Android SDK paths..."
          ls -la "$ANDROID_SDK_ROOT/" 2>/dev/null || echo "ANDROID_SDK_ROOT not found: $ANDROID_SDK_ROOT"
          find /usr/local/lib/android/sdk -name "aidl" -type f 2>/dev/null | head -5 || echo "No aidl found in /usr/local/lib"
          find ~ -name "aidl" -type f 2>/dev/null | head -5 || echo "No aidl found in home"

      - name: Add legacy sdkmanager path for Buildozer
        run: mkdir -p "$ANDROID_SDK_ROOT/tools/bin" && ln -sf "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "$ANDROID_SDK_ROOT/tools/bin/sdkmanager" && ln -sf "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/avdmanager" "$ANDROID_SDK_ROOT/tools/bin/avdmanager"

      - name: Accept Android SDK licenses and install build tools
        run: yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$ANDROID_SDK_ROOT" --licenses && "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "platforms;android-31" "build-tools;31.0.0" "cmake;3.22.1"

      - name: Verify AIDL exists and set permissions
        run: |
          echo "Looking for aidl binary..."
          AIDL_PATH="$ANDROID_SDK_ROOT/build-tools/31.0.0/aidl"
          
          if [ -f "$AIDL_PATH" ]; then
            chmod +x "$AIDL_PATH"
            echo "✓ AIDL found and made executable"
            ls -la "$AIDL_PATH"
          else
            echo "✗ AIDL not found at $AIDL_PATH"
            echo "Available build-tools versions:"
            ls -la "$ANDROID_SDK_ROOT/build-tools/" 2>/dev/null || echo "build-tools directory not found"
            echo "Searching for aidl anywhere in SDK:"
            find "$ANDROID_SDK_ROOT" -name "aidl" -type f 2>/dev/null || echo "AIDL not found"
            exit 1
          fi

      - name: Install system dependencies
        run: sudo apt update && sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip setuptools wheel Cython==0.29.33 buildozer && if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: loon-survival-apk
          path: bin/*.apk
          if-no-files-found: error
